---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: 
  name: bloodapphpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bloodappdeployment
  minReplicas: 2
  maxReplicas: 7
  metrics:
    - type: Resource
      resource:
       name: cpu
       target:
        type: Utilization
        averageUtilization: 60